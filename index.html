<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 820px;
      background: #ffffff;
      border: 0.5px solid #e0ddd6;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 28px 18px;
      border-bottom: 0.5px solid #ebe8e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .avatar {
      width: 34px; height: 34px;
      background: #f0ede6;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .header-title { font-size: 15px; font-weight: 500; color: #1a1a18; }
    .header-sub { font-size: 12px; color: #888; margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #5cb87a;
      border-radius: 50%;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #e0ddd6; border-radius: 4px; }

    /* Message rows */
    .row { display: flex; align-items: flex-end; gap: 10px; }
    .row.user { flex-direction: row-reverse; }

    .row-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f0ede6;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 68%;
      padding: 11px 16px;
      font-size: 14.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row.ai .bubble {
      background: #f5f5f3;
      color: #1a1a18;
      border-radius: 4px 16px 16px 16px;
    }

    .row.user .bubble {
      background: #1a1a18;
      color: #f5f5f3;
      border-radius: 16px 4px 16px 16px;
    }

    .row.typing .bubble {
      background: #f5f5f3;
      color: #aaa;
      border-radius: 4px 16px 16px 16px;
      font-style: italic;
      font-size: 13px;
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      margin: auto 0;
    }

    .welcome-icon { font-size: 48px; margin-bottom: 20px; }

    .welcome-title {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .welcome-sub {
      font-size: 15px;
      color: #aaa;
      max-width: 320px;
      line-height: 1.6;
    }

    /* Timestamp */
    .ts {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      margin: 4px 0;
      letter-spacing: 0.02em;
    }

    /* Input area */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 0.5px solid #ebe8e0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f5f5f3;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      padding: 0 14px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within { border-color: #aaa; }

    .input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 0;
      font-size: 14.5px;
      font-family: 'Inter', sans-serif;
      color: #1a1a18;
      outline: none;
    }

    .input-wrap input::placeholder { color: #bbb; }

    .send-btn {
      width: 40px; height: 40px;
      background: #1a1a18;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: #333; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    /* Hint text */
    .hint { font-size: 11.5px; color: #bbb; text-align: center; padding: 0 20px 14px; }
  </style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="header-title">AI Assistant</div>
        <div class="header-sub">Powered by GPT-4.1-mini</div>
      </div>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1 class="welcome-title">How can I help you?</h1>
      <p class="welcome-sub">Ask me anything about programming, robotics, or AI.</p>
    </div>
    <div class="ts" id="start-ts" style="display:none"></div>
  </div>

  <div class="hint">Press Enter to send</div>

  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="userInput" placeholder="Message AI Assistant..." autocomplete="off" />
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  // ⚠️ Apna Render backend URL yahan paste karo
  const BACKEND_URL = "https://your-backend.onrender.com";

  const chatHistory = [];
  const messagesDiv = document.getElementById("messages");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = `row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "row-avatar";
    avatar.textContent = role === "user" ? "👤" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    if (role === "user") {
      row.appendChild(bubble);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(bubble);
    }

    messagesDiv.appendChild(row);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "row typing";
    row.id = "typing-row";

    const avatar = document.createElement("div");
    avatar.className = "row-avatar";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = "Thinking...";

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesDiv.appendChild(row);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = "";
    sendBtn.disabled = true;

    addMessage("user", text);
    chatHistory.push({ role: "user", content: text });

    // Hide welcome screen on first message
    const welcome = document.getElementById("welcome");
    if (welcome) {
      const ts = document.getElementById("start-ts");
      ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      ts.style.display = "block";
      welcome.remove();
    }

    addTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: chatHistory })
      });

      const data = await res.json();
      document.getElementById("typing-row")?.remove();

      const reply = data.reply || data.error || "Something went wrong.";
      addMessage("ai", reply);
      chatHistory.push({ role: "assistant", content: reply });

    } catch (err) {
      document.getElementById("typing-row")?.remove();
      addMessage("ai", "Error: Could not connect to server.");
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>

</body>
</html>
