<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  /* AUTH PAGES */
  .auth-wrapper { width: 100%; max-width: 420px; padding: 20px; }
  .auth-card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .auth-card h1 { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 28px; text-align: center; }
  .auth-card p { color: #666; font-size: 14px; margin-bottom: 28px; }
  .auth-card label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 6px; }
  .auth-card input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; margin-bottom: 16px; }
  .auth-card input:focus { border-color: #6366f1; }
  .auth-btn { width: 100%; padding: 12px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .auth-btn:hover { background: #4f46e5; }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
  .auth-switch a { color: #6366f1; font-weight: 500; cursor: pointer; text-decoration: none; }
  .auth-switch a:hover { text-decoration: underline; }
  .auth-error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  .auth-success { background: #f0fdf4; border: 1px solid #86efac; color: #16a34a; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }

  /* CHAT PAGE */
  .chat-wrapper { display: none; width: 100%; max-width: 720px; height: 100vh; flex-direction: column; background: #fff; }
  .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #eee; background: #fff; }
  .chat-header-left { display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 9px; height: 9px; background: #22c55e; border-radius: 50%; }
  .chat-header h2 { font-size: 16px; font-weight: 600; color: #111; }
  .user-email { font-size: 13px; color: #888; }
  .logout-btn { background: none; border: 1.5px solid #eee; padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; color: #666; transition: all 0.2s; }
  .logout-btn:hover { border-color: #dc2626; color: #dc2626; }
  .file-badge { background: #ecfdf5; border: 1px solid #86efac; color: #16a34a; font-size: 12px; padding: 4px 10px; border-radius: 20px; display: none; align-items: center; gap: 6px; }
  .file-badge button { background: none; border: none; cursor: pointer; color: #16a34a; font-size: 14px; line-height: 1; }

  /* WELCOME */
  .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; text-align: center; padding: 40px; }
  .welcome-screen .robot { font-size: 56px; margin-bottom: 16px; }
  .welcome-screen h3 { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 8px; }
  .welcome-screen p { font-size: 15px; color: #888; }

  /* MESSAGES */
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; display: none; }
  .msg { display: flex; flex-direction: column; max-width: 75%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }
  .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user .msg-bubble { background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai .msg-bubble { background: #f4f4f5; color: #111; border-bottom-left-radius: 4px; }
  .msg-time { font-size: 11px; color: #bbb; margin-top: 4px; }
  .typing { display: none; align-self: flex-start; }
  .typing .msg-bubble { background: #f4f4f5; color: #999; font-style: italic; }

  /* INPUT */
  .input-area { padding: 16px 20px; border-top: 1px solid #eee; background: #fff; }
  .input-row { display: flex; gap: 10px; align-items: center; }
  .file-btn { background: none; border: 1.5px solid #eee; border-radius: 10px; padding: 10px 12px; cursor: pointer; font-size: 18px; color: #666; transition: all 0.2s; }
  .file-btn:hover { border-color: #6366f1; color: #6366f1; }
  #messageInput { flex: 1; padding: 12px 16px; border: 1.5px solid #eee; border-radius: 12px; font-size: 14px; outline: none; resize: none; font-family: inherit; transition: border 0.2s; }
  #messageInput:focus { border-color: #6366f1; }
  .send-btn { background: #6366f1; color: #fff; border: none; border-radius: 12px; padding: 12px 18px; cursor: pointer; font-size: 18px; transition: background 0.2s; }
  .send-btn:hover { background: #4f46e5; }
  #fileInput { display: none; }

  @media (max-width: 600px) {
    .chat-wrapper { max-width: 100%; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="auth-wrapper" id="loginPage">
  <div class="auth-card">
    <h1>Login</h1>
    <div class="auth-error" id="loginError"></div>
    <div class="auth-success" id="loginSuccess"></div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••" />
    <button class="auth-btn" onclick="login()">Log In</button>
    <div class="auth-switch">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
  </div>
</div>

<!-- SIGNUP PAGE -->
<div class="auth-wrapper" id="signupPage" style="display:none">
  <div class="auth-card">
    <h1>Signup</h1>
    <div class="auth-error" id="signupError"></div>
    <div class="auth-success" id="signupSuccess"></div>
    <label>Email</label>
    <input type="email" id="signupEmail" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" id="signupPassword" placeholder="Min 6 characters" />
    <button class="auth-btn" onclick="signup()">Create Account</button>
    <div class="auth-switch">Already have an account? <a onclick="showLogin()">Log in</a></div>
  </div>
</div>

<!-- CHAT PAGE -->
<div class="chat-wrapper" id="chatPage">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="status-dot"></div>
      <div>
        <h2>AI Chatbot</h2>
        <div class="user-email" id="userEmailDisplay"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="file-badge" id="fileBadge">
        <span id="fileName">file.pdf</span>
        <button onclick="clearFile()">✕</button>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="welcome-screen" id="welcomeScreen">
    <div class="robot">🤖</div>
    <h3>How can I help you?</h3>
    <p>Ask me anything about programming, robotics, or AI.</p>
  </div>

  <div class="messages" id="messages">
    <div class="typing msg ai" id="typing">
      <div class="msg-bubble">Thinking...</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="file-btn" onclick="document.getElementById('fileInput').click()" title="Upload file">📎</button>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="uploadFile(this)" />
      <textarea id="messageInput" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
const BACKEND = "https://chatbot-backend-production-182b.up.railway.app";
let currentUser = null;

// ---- AUTH ----
function showSignup() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('signupPage').style.display = 'flex';
}
function showLogin() {
  document.getElementById('signupPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

async function signup() {
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errEl = document.getElementById('signupError');
  const okEl = document.getElementById('signupSuccess');
  errEl.style.display = 'none'; okEl.style.display = 'none';

  if (!email || !password) { errEl.textContent = 'Please fill all fields.'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }

  try {
    const res = await fetch(`${BACKEND}/signup`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.detail || 'Signup failed.'; errEl.style.display = 'block'; return; }
    okEl.textContent = 'Account created! Logging you in...'; okEl.style.display = 'block';
    setTimeout(() => enterChat(data), 1000);
  } catch(e) { errEl.textContent = 'Could not connect to server.'; errEl.style.display = 'block'; }
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!email || !password) { errEl.textContent = 'Please fill all fields.'; errEl.style.display = 'block'; return; }

  try {
    const res = await fetch(`${BACKEND}/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.detail || 'Login failed.'; errEl.style.display = 'block'; return; }
    enterChat(data);
  } catch(e) { errEl.textContent = 'Could not connect to server.'; errEl.style.display = 'block'; }
}

function enterChat(user) {
  currentUser = user;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('signupPage').style.display = 'none';
  document.getElementById('chatPage').style.flex = '1';
  document.getElementById('chatPage').style.display = 'flex';
  document.getElementById('userEmailDisplay').textContent = user.email;
}

function logout() {
  currentUser = null;
  document.getElementById('chatPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('messages').innerHTML = `<div class="typing msg ai" id="typing"><div class="msg-bubble">Thinking...</div></div>`;
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('fileBadge').style.display = 'none';
}

// ---- CHAT ----
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function timeNow() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMsg(text, role) {
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing');

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${timeNow()}</div>`;
  msgs.insertBefore(div, typing);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  // Hide welcome, show messages
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';

  addMsg(msg, 'user');
  document.getElementById('typing').style.display = 'flex';

  try {
    const res = await fetch(`${BACKEND}/chat`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, user_id: currentUser?.user_id || 'default'})
    });
    const data = await res.json();
    document.getElementById('typing').style.display = 'none';
    addMsg(data.reply || 'Error.', 'ai');
  } catch(e) {
    document.getElementById('typing').style.display = 'none';
    addMsg('Could not connect to server.', 'ai');
  }
}

async function uploadFile(input) {
  if (!input.files[0]) return;
  const userId = currentUser?.user_id || 'default';
  const formData = new FormData();
  formData.append('file', input.files[0]);

  try {
    const res = await fetch(`${BACKEND}/upload?user_id=${encodeURIComponent(userId)}`, { method: 'POST', body: formData });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('fileName').textContent = input.files[0].name;
      document.getElementById('fileBadge').style.display = 'flex';
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('messages').style.display = 'flex';
      addMsg(`📎 File "<b>${input.files[0].name}</b>" upload ho gayi! Ab is file ke baare mein kuch bhi poocho.`, 'ai');
    } else {
      alert(data.detail || 'File upload failed.');
    }
  } catch(e) { alert('File upload failed. Server se connect nahi ho saka.'); }
  input.value = '';
}

async function clearFile() {
  const userId = currentUser?.user_id || 'default';
  await fetch(`${BACKEND}/clear-file/${encodeURIComponent(userId)}`, { method: 'DELETE' });
  document.getElementById('fileBadge').style.display = 'none';
}
</script>
</body>
</html>
