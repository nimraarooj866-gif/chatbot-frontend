<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      background: white;
      width: 100%;
      max-width: 720px;
      height: 92vh;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #1a1a2e;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px; height: 10px;
      background: #4ade80;
      border-radius: 50%;
    }

    .chat-header h2 { font-size: 16px; font-weight: 600; }
    .chat-header p { font-size: 12px; opacity: 0.6; }

    /* File badge */
    .file-badge {
      margin-left: auto;
      background: #22c55e22;
      color: #22c55e;
      border: 1px solid #22c55e55;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .file-badge.visible { display: flex; }

    .file-badge button {
      background: none;
      border: none;
      color: #22c55e;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #888;
      gap: 12px;
    }

    .welcome .icon { font-size: 48px; }
    .welcome h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
    .welcome p { font-size: 14px; max-width: 300px; line-height: 1.6; }

    /* Bubbles */
    .message { display: flex; gap: 10px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .bubble {
      background: #1a1a2e;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: #f1f3f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .avatar { background: #1a1a2e; color: white; font-size: 13px; }
    .message.ai .avatar { background: #e8e8f0; }

    /* Typing */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
      background: #f1f3f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px; height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Input area */
    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid #e8e8e8;
      background: white;
    }

    /* Upload preview bar */
    .upload-preview {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #166534;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .upload-preview.visible { display: flex; }
    .upload-preview span { flex: 1; }

    .upload-preview button {
      background: none;
      border: none;
      color: #166534;
      cursor: pointer;
      font-size: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    /* File upload button */
    .upload-btn {
      background: #f1f3f5;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .upload-btn:hover { background: #e2e6ea; }

    #file-input { display: none; }

    textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border 0.2s;
      max-height: 120px;
    }

    textarea:focus { border-color: #1a1a2e; }

    .send-btn {
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.85; }

    .hint {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="status-dot"></div>
    <div>
      <h2>AI Assistant</h2>
      <p>Online</p>
    </div>
    <div class="file-badge" id="file-badge">
      📄 <span id="badge-name"></span>
      <button onclick="clearFile()" title="Remove file">✕</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages">
    <div class="welcome" id="welcome-screen">
      <div class="icon">🤖</div>
      <h1>How can I help you?</h1>
      <p>Ask me anything, or upload a PDF / Word / TXT file and ask questions about it.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">

    <!-- Upload preview -->
    <div class="upload-preview" id="upload-preview">
      📄 <span id="preview-name"></span>
      <button onclick="clearFile()">✕</button>
    </div>

    <div class="input-row">
      <label class="upload-btn" for="file-input" title="Upload file">📎</label>
      <input type="file" id="file-input" accept=".pdf,.docx,.txt" onchange="handleFileUpload(event)" />

      <textarea
        id="user-input"
        rows="1"
        placeholder="Type a message..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>

      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <div class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>
</div>

<script>
  const BACKEND_URL = "https://chatbot-backend-production-182b.up.railway.app";
  const SESSION_ID = "user_" + Math.random().toString(36).substr(2, 9);

  let welcomeVisible = true;
  let uploadedFileName = null;

  function hideWelcome() {
    if (welcomeVisible) {
      document.getElementById("welcome-screen").style.display = "none";
      welcomeVisible = false;
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function appendMessage(role, text) {
    hideWelcome();
    const container = document.getElementById("chat-messages");

    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById("chat-messages");
    const el = document.createElement("div");
    el.className = "message ai";
    el.id = "typing";
    el.innerHTML = `<div class="avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    // Show uploading state
    appendMessage("ai", `Uploading "${file.name}"...`);

    try {
      const res = await fetch(`${BACKEND_URL}/upload?session_id=${SESSION_ID}`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || "Upload failed");

      uploadedFileName = file.name;

      // Update UI
      document.getElementById("upload-preview").classList.add("visible");
      document.getElementById("preview-name").textContent = file.name;
      document.getElementById("file-badge").classList.add("visible");
      document.getElementById("badge-name").textContent = file.name;

      appendMessage("ai", `✅ "${file.name}" uploaded! Now ask me anything about this file.`);

    } catch (err) {
      appendMessage("ai", `❌ Upload failed: ${err.message}`);
    }

    event.target.value = "";
  }

  function clearFile() {
    uploadedFileName = null;
    document.getElementById("upload-preview").classList.remove("visible");
    document.getElementById("file-badge").classList.remove("visible");

    fetch(`${BACKEND_URL}/clear/${SESSION_ID}`, { method: "DELETE" });
    appendMessage("ai", "File removed. Back to normal chat mode.");
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.style.height = "auto";

    appendMessage("user", message);
    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, session_id: SESSION_ID })
      });

      const data = await res.json();
      hideTyping();

      if (!res.ok) throw new Error(data.detail || "Error");

      appendMessage("ai", data.reply);

    } catch (err) {
      hideTyping();
      appendMessage("ai", "Error: Could not connect to server.");
    }
  }
</script>

</body>
</html>
